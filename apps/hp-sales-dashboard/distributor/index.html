<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Pumpkin — Distributor Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--or:#E8611A;--orl:#F5924A;--orp:#FFF0E6;--navy:#0F1F3A;--slate:#3D5A80;--ink:#0F1F3A;
  --mist:#EEF3F8;--white:#FAFCFF;--green:#1D9E75;--red:#C0392B;--amber:#E8A020;
  --blue:#378ADD;--border:rgba(15,31,58,.10);--r:10px;
  --font:'Plus Jakarta Sans',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#F4F7FB;color:var(--ink);font-size:13px}
.topbar{position:sticky;top:0;z-index:300;background:var(--navy);border-bottom:2px solid var(--or);
  display:flex;align-items:center;gap:12px;padding:0 20px;height:50px}
.topbar-brand{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;white-space:nowrap;flex-shrink:0}
.topbar-brand span{color:var(--orl)}
.cust-search{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;
  padding:7px 12px;color:#fff;font-family:var(--mono);font-size:11px;width:220px;outline:none;flex-shrink:0}
.cust-search::placeholder{color:rgba(255,255,255,.35)}
.cust-search:focus{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}
.htabs-area{display:flex;align-items:center;flex:1;gap:8px;min-width:0}
.htabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.2) transparent;min-width:0}
.htabs::-webkit-scrollbar{height:3px}
.htabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.htab{padding:5px 10px;font-size:10.5px;font-weight:600;letter-spacing:.02em;color:rgba(255,255,255,.38);
  border-radius:5px;cursor:pointer;transition:all .12s;white-space:nowrap;border:none;background:none;
  flex-shrink:0;font-family:var(--font)}
.htab:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.07)}
.htab.active{color:#fff;background:var(--or);font-weight:700}
.htab.htab-star{color:var(--orl);font-weight:700}
.htab.htab-star.active{color:#fff;background:var(--or)}
.htab .br-dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--orl);margin-left:3px;vertical-align:middle}
.tab-divider{width:1px;height:20px;background:rgba(255,255,255,.15);flex-shrink:0;margin:0 2px}
/* Distributor dropdown picker */
.dist-picker{position:relative;flex-shrink:0}
.dist-picker-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;
  padding:5px 10px;color:rgba(255,255,255,.8);font-family:var(--mono);font-size:10.5px;cursor:pointer;
  white-space:nowrap;display:flex;align-items:center;gap:5px}
.dist-picker-btn:hover{background:rgba(255,255,255,.15)}
.dist-picker-btn::after{content:'▾';font-size:9px;color:rgba(255,255,255,.4)}
.dist-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;width:260px;
  background:#1a2a45;border:1px solid rgba(255,255,255,.15);border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:500;overflow:hidden}
.dist-picker.open .dist-dropdown{display:block}
.dist-dd-search{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
.dist-dd-search input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:6px;padding:5px 9px;color:#fff;font-family:var(--mono);font-size:11px;outline:none}
.dist-dd-search input::placeholder{color:rgba(255,255,255,.3)}
.dist-dd-list{max-height:280px;overflow-y:auto;padding:6px}
.dist-dd-list::-webkit-scrollbar{width:4px}
.dist-dd-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.ddi{padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.7);
  display:flex;align-items:center;gap:6px}
.ddi:hover{background:rgba(255,255,255,.08);color:#fff}
.ddi.active{background:rgba(232,99,42,.2);color:var(--orl)}
.ddi-dot{width:5px;height:5px;border-radius:50%;background:var(--orl);flex-shrink:0}
.ddi-val{margin-left:auto;font-family:var(--mono);font-size:9.5px;color:rgba(255,255,255,.3)}
.dd-section{font-family:var(--mono);font-size:8.5px;text-transform:uppercase;letter-spacing:.1em;
  color:rgba(255,255,255,.25);padding:6px 10px 3px;font-weight:700}
.shell{display:flex;min-height:calc(100vh - 50px)}
.sidebar{width:200px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);
  position:sticky;top:50px;height:calc(100vh - 50px);overflow-y:auto}
.sb-sect{padding:6px 0}
.sb-lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.12em;
  color:rgba(15,31,58,.35);font-weight:600;padding:10px 18px 5px}
.vtab{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:12px;font-weight:600;
  color:rgba(15,31,58,.5);cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.vtab:hover{background:var(--mist);color:var(--ink)}
.vtab.active{color:var(--or);border-left-color:var(--or);background:var(--orp)}
.vtab .ic{width:16px;text-align:center;font-size:13px}
.content{flex:1;padding:24px 28px 60px;max-width:1160px}
.sec{display:none}.sec.active{display:block}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--or);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
/* HERO */
.hero-card{background:var(--navy);border-radius:12px;padding:20px 24px;display:flex;
  align-items:center;justify-content:space-between;gap:20px;margin-bottom:18px;overflow:hidden;position:relative}
.hero-card::before{content:'';position:absolute;right:-40px;top:-60px;width:260px;height:260px;
  border-radius:50%;background:radial-gradient(circle,rgba(232,97,26,.18) 0%,transparent 70%)}
.hero-left{z-index:1;min-width:0}
.hero-badge{display:inline-block;background:var(--or);color:#fff;font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:4px;margin-bottom:7px}
.hero-title{font-size:21px;font-weight:800;color:#fff;letter-spacing:-.4px;line-height:1.15}
.hero-title span{color:var(--orl)}
.hero-meta{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4);margin-top:5px;letter-spacing:.04em;line-height:1.6}
.hero-kpis{display:flex;gap:18px;z-index:1;flex-shrink:0}
.hkpi{text-align:right}
.hkpi .val{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.4px}
.hkpi .val.or{color:var(--orl)}.hkpi .val.gr{color:#5FD4A8}
.hkpi .lbl{font-family:var(--mono);font-size:8.5px;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.hero-div{width:1px;background:rgba(255,255,255,.15);align-self:stretch}
/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px;position:relative;overflow:hidden}
.kpi.dk{background:var(--navy);border-color:var(--navy)}
.kpi.dk .kpi-lbl,.kpi.dk .kpi-sub{color:rgba(255,255,255,.38)}
.kpi.dk .kpi-v{color:#fff}
.kpi-lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:rgba(15,31,58,.4);margin-bottom:5px}
.kpi-v{font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-.4px;line-height:1}
.kpi-v.or{color:var(--or)}.kpi-v.gr{color:var(--green)}.kpi-v.rd{color:var(--red)}.kpi-v.am{color:var(--amber)}
.kpi-sub{font-family:var(--mono);font-size:10px;margin-top:5px;color:rgba(15,31,58,.45)}
.kpi-sub.up{color:var(--green)}.kpi-sub.dn{color:var(--red)}.kpi-sub.warn{color:var(--amber)}
.kpi-bar{position:absolute;bottom:0;left:0;height:3px;background:var(--or)}
/* FUNNEL */
.funnel{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin-bottom:18px;background:#fff}
.funnel-step{padding:16px 18px;border-right:1px solid var(--border);position:relative}
.funnel-step:last-child{border-right:none}
.funnel-lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.07em;color:rgba(15,31,58,.4);margin-bottom:5px}
.funnel-val{font-size:18px;font-weight:800;letter-spacing:-.3px}
.funnel-qty{font-family:var(--mono);font-size:10px;color:rgba(15,31,58,.45);margin-top:3px}
.funnel-pct{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:4px;margin-top:6px}
.funnel-track{height:4px;background:var(--mist);border-radius:2px;margin-top:8px;overflow:hidden}
.funnel-fill{height:100%;border-radius:2px}
/* CHART BOXES */
.chart-row{display:grid;gap:14px;margin-bottom:14px}
.r1{grid-template-columns:1fr}.r11{grid-template-columns:1fr 1fr}
.r21{grid-template-columns:3fr 2fr}.r12{grid-template-columns:2fr 3fr}
.r111{grid-template-columns:1fr 1fr 1fr}
.cbox{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px}
.cbox h3{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:rgba(15,31,58,.4);margin-bottom:12px}
/* TABLE */
.tbl-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
table.dt{width:100%;border-collapse:collapse;font-size:12px}
table.dt th{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.07em;
  color:rgba(15,31,58,.4);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);
  background:var(--mist);white-space:nowrap}
table.dt td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
table.dt tr:last-child td{border-bottom:none}
table.dt tr:hover td{background:#F8FAFC}
table.dt .num{text-align:right;font-family:var(--mono);font-size:11px}
table.dt .bold{font-weight:700}
.fb-wrap{display:flex;align-items:center;gap:6px}
.fb{flex:1;height:6px;background:var(--mist);border-radius:3px;overflow:hidden;min-width:40px}
.fb-fill{height:100%;border-radius:3px}
.fb-num{font-family:var(--mono);font-size:10.5px;min-width:30px;text-align:right;font-weight:700}
/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.bg{background:#E8F8F2;color:var(--green)}.bo{background:#FFF0E6;color:var(--or)}
.br{background:#FCEBEB;color:var(--red)}.ba{background:#FEF5E7;color:#633806}
.bn{background:#E8EDF3;color:var(--navy)}.bb{background:#EAF1FB;color:#1A60B0}.bp{background:#F3EAF8;color:#6A1A9A}
/* COLOUR CHIP */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;
  border:1px solid rgba(15,31,58,.1);font-size:10px;font-family:var(--mono);
  background:#fff;color:var(--ink);margin:2px 2px 2px 0;vertical-align:middle}
.chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.12)}
/* COLOUR GROUP BADGE - grouped display */
.cg-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;
  font-size:10px;font-family:var(--mono);font-weight:600;margin:2px;border:1px solid transparent}
.cg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15)}
/* SIZE BARS */
.size-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.size-lbl{font-family:var(--mono);font-size:10.5px;font-weight:600;min-width:68px}
.size-track{flex:1;height:20px;background:var(--mist);border-radius:5px;overflow:hidden}
.size-fill{height:100%;display:flex;align-items:center;padding-left:8px;
  font-family:var(--mono);font-size:9.5px;color:#fff;font-weight:700;border-radius:5px;min-width:24px}
.size-num{font-family:var(--mono);font-size:10px;min-width:44px;text-align:right;color:rgba(15,31,58,.5)}
/* MONTH BARS */
.month-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.mb-lbl{font-family:var(--mono);font-size:10px;min-width:46px;color:rgba(15,31,58,.55)}
.mb-track{flex:1;height:8px;background:var(--mist);border-radius:3px;overflow:hidden}
.mb-fill{height:100%;border-radius:3px;background:var(--or)}
.mb-val{font-family:var(--mono);font-size:10px;min-width:60px;text-align:right;color:rgba(15,31,58,.55)}
.mb-pct{font-family:var(--mono);font-size:10px;font-weight:700;min-width:30px;text-align:right}
/* NOTE / INFO */
.note{background:#FFFBEB;border:1px solid #F6D860;border-left:4px solid var(--amber);
  border-radius:0 var(--r) var(--r) 0;padding:11px 15px;margin-bottom:14px}
.note p{font-size:11.5px;line-height:1.6}
.info-box{background:#EAF1FB;border:1px solid rgba(55,138,221,.2);border-radius:var(--r);
  padding:11px 14px;font-size:11.5px;color:#1A4F80;line-height:1.55;margin-bottom:14px}
/* MARKET */
.mkt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.rank-strip{display:grid;grid-template-columns:22px 1fr auto;align-items:center;gap:10px;
  padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.rank-strip:last-child{border-bottom:none}
.rank-strip:hover{background:var(--mist);margin:0 -16px;padding:9px 16px}
.rank-n{font-family:var(--mono);font-size:11px;color:rgba(15,31,58,.3);font-weight:600;text-align:center}
.rank-name{font-weight:700;font-size:12.5px}
.rank-sub{font-family:var(--mono);font-size:10px;color:rgba(15,31,58,.45);margin-top:1px}
.rank-val{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--or);text-align:right}
.rank-rate{font-family:var(--mono);font-size:10px;text-align:right;margin-top:2px}
/* BRANCH */
.br-rollup{background:var(--navy);border-radius:var(--r);padding:16px 20px;margin-bottom:12px}
.br-rollup h4{font-size:13px;font-weight:800;color:#fff;margin-bottom:12px}
.br-rollup .mini-kpis{display:flex;gap:18px;flex-wrap:wrap}
.br-rollup .mk .v{font-size:16px;font-weight:800;color:#fff}
.br-rollup .mk .v.or{color:var(--orl)}
.br-rollup .mk .l{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4);margin-top:2px}
.br-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.br-card .br-name{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.br-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.br-stat .bsl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:rgba(15,31,58,.4);margin-bottom:3px}
.br-stat .bsv{font-size:16px;font-weight:800}
.br-stat .bsv.or{color:var(--or)}.br-stat .bsv.gr{color:var(--green)}
/* RESPONSIVE */
@media(max-width:980px){
  .sidebar{display:none}
  .content{padding:14px 14px 50px;max-width:100%}
  .chart-row.r21,.chart-row.r12,.chart-row.r111,.chart-row.r11{grid-template-columns:1fr}
  .br-mini{grid-template-columns:1fr 1fr}
  .hero-card{flex-direction:column;gap:12px;padding:16px 18px}
  .hero-kpis{justify-content:flex-start;gap:14px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .funnel{grid-template-columns:1fr;border-right:none}
  .funnel-step{border-right:none;border-bottom:1px solid var(--border)}
  .funnel-step:last-child{border-bottom:none}
  .mkt-grid{grid-template-columns:1fr 1fr}
  /* Mobile nav: hide pinned tabs, just show dropdown + brand */
  .htabs{display:none}
  .tab-divider{display:none!important}
  .dist-dropdown{right:0;left:auto;width:min(260px,90vw)}
  .htabs-area{justify-content:flex-end}
  .dist-picker-btn{max-width:160px;overflow:hidden;text-overflow:ellipsis}
}
@media(max-width:560px){
  .topbar{flex-wrap:wrap;height:auto;padding:10px 14px;gap:8px}
  .htabs-area{width:100%;justify-content:flex-end}
  .kpi-row{grid-template-columns:1fr 1fr}
  .hkpi .val{font-size:16px}
  .hero-title{font-size:18px}
}

</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">Happy Pumpkin <span>· Distributors</span></div>
  <div class="htabs-area">
    <!-- Pinned star tab + top distributors shown inline -->
    <div class="htabs" id="htabs"></div>
    <div class="tab-divider" id="tabDivider" style="display:none"></div>
    <div class="dist-picker" id="distPicker">
      <div class="dist-picker-btn" id="distPickerBtn" onclick="togglePicker()">All Distributors</div>
      <div class="dist-dropdown" id="distDropdown">
        <div class="dist-dd-search"><input id="ddSearch" placeholder="Cari distributor..." oninput="filterDropdown(this.value)"></div>
        <div class="dist-dd-list" id="ddList"></div>
      </div>
    </div>
  </div>
</div>
<div class="shell">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

function rp(n){if(n>=1e9)return'Rp '+(n/1e9).toFixed(2)+' M';if(n>=1e6)return'Rp '+(n/1e6).toFixed(1)+' Jt';if(n>=1e3)return'Rp '+(n/1e3).toFixed(0)+'rb';return'Rp '+Math.round(n);}
function qf(n){return Math.round(n).toLocaleString('id-ID')}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function fcl(r){return r>=90?C.green:r>=70?C.amber:C.red}
function fbcl(r){return r>=90?C.green:r>=70?C.amber:C.red}

function colourGroup(name){return CMAP_GROUP[name]||'Earth & Tan';}
function colourHex(name){return CMAP[name]||'#BBB';}

/* Build grouped colour chips from a list of [name, po, ato] or [name, ato] */
function renderColourGroups(colours){
  // colours = [[name, ato], ...]  — aggregate by group
  const groups = {};
  for(const c of colours){
    const g = colourGroup(c[0]);
    if(!groups[g]) groups[g]={names:[],ato:0};
    groups[g].names.push(c[0]);
    groups[g].ato += (c[2]!==undefined?c[2]:c[1]);
  }
  return Object.entries(groups)
    .sort((a,b)=>b[1].ato-a[1].ato)
    .map(([g,d])=>{
      const gi = COLOUR_GROUPS[g]||{hex:'#999',text:'#fff',bg:'#F0F0F0'};
      // show individual raw names as small sub-dots on hover title
      const title = d.names.join(', ');
      return `<span class="cg-badge" style="background:${gi.bg};border-color:${gi.hex}40;color:${gi.text==='#fff'?gi.hex.replace('8A','5A'):gi.text}" title="${title}"><span class="cg-dot" style="background:${gi.hex}"></span>${g}</span>`;
    }).join('');
}

/* Compact chip showing actual colour name + swatch (for table rows) */
function renderColourChips(colours, max=4){
  return colours.slice(0,max).map(c=>{
    const hex = colourHex(c[0]);
    return `<span class="chip"><span class="chip-dot" style="background:${hex}"></span>${c[0]}</span>`;
  }).join('');
}

function categorize(name){
  const n=name.toLowerCase();
  const baby=['breatheknit','softair','bbl','bbs','cozy','comfy','ob.'];
  const girls=['calla','nellie','lily','mabel','wonder','bella','chloe','bea','lizzy','luna','daisy'];
  const boys=['robin','oscar','ziggy','nick','bobby','woody','track','charlie','arlo','elio','enzo','nilo','arvy','benson','rex'];
  const dress=['dress','skirt','ruffle'];
  for(const k of baby)if(n.includes(k))return 'Babywear';
  for(const k of dress)if(n.includes(k))return 'Dresses';
  for(const k of girls)if(n.includes(k))return 'Girls';
  for(const k of boys)if(n.includes(k))return 'Boys';
  return 'Other';
}

  return '';}

/* ═════ PER-CUSTOMER ═════ */
function hero(p){
  const t=p.totals;const rate=pct(t.ato,t.po);
  const brTag=p.has_branches?`<span class="badge bn" style="font-size:9px">${p.branches.filter(b=>b.branch!=='Main').length} Cab</span>`:'';
  return `<div class="hero-card">
    <div class="hero-left">
      <div class="hero-badge">HP Distributor Dashboard</div>
      <div class="hero-title">${p.parent} ${brTag}</div>
      <div class="hero-meta">ORDER PERTAMA: ${MLAB[p.first_month]} &nbsp;·&nbsp; ${p.months_present.length} BULAN AKTIF<br>${p.n_orders} TOTAL ORDER &nbsp;·&nbsp; ${p.n_products} SKU UNIK</div>
    </div>
    <div class="hero-kpis">
      <div class="hkpi"><div class="val">${rp(t.ori)}</div><div class="lbl">Gross ORI PO</div></div>
      <div class="hero-div"></div>
      <div class="hkpi"><div class="val or">${rp(t.ato_val)}</div><div class="lbl">Total ATO</div></div>
      <div class="hero-div"></div>
      <div class="hkpi"><div class="val" style="color:${rate>=80?'#5FD4A8':rate>=65?'#F5C04A':'#F58A6A'}">${rate}%</div><div class="lbl">Fulfillment</div></div>
    </div>
  </div>`;}

function renderCust(p,sec){
  if(!['summary','flow','products','colours','sizeclass','timeline','branches'].includes(sec))sec='summary';
  const t=p.totals;const rate=pct(t.ato,t.po);const h=hero(p);

  if(sec==='summary'){
    const lost=t.po-t.ato;
    const kpis=`<div class="kpi-row">
      <div class="kpi"><div class="kpi-bar" style="width:100%"></div><div class="kpi-lbl">ATO Value</div><div class="kpi-v or">${rp(t.ato_val)}</div><div class="kpi-sub">${qf(t.ato)} pcs fulfilled</div></div>
      <div class="kpi"><div class="kpi-bar" style="width:${rate}%;background:${fcl(rate)}"></div><div class="kpi-lbl">Net Sales</div><div class="kpi-v gr">${rp(t.net)}</div><div class="kpi-sub">est. setelah diskon</div></div>
      <div class="kpi"><div class="kpi-lbl">Fulfillment Rate</div><div class="kpi-v" style="color:${fcl(rate)}">${rate}%</div><div class="kpi-sub ${rate>=80?'up':rate>=65?'warn':'dn'}">${rate>=80?'⬆ Sangat Baik':rate>=65?'⚠ Perlu Monitor':'⬇ Perlu Perhatian'}</div></div>
      <div class="kpi"><div class="kpi-lbl">Unmet Demand</div><div class="kpi-v rd">${qf(lost)}</div><div class="kpi-sub" style="color:var(--red)">${rp(t.ori-t.ato_val)} potensi hilang</div></div>
    </div>`;
    const ms=p.mseries;const mxv=Math.max(...ms.map(m=>m.ato_val),1);
    const mbars=ms.map(m=>{const w=Math.round(m.ato_val/mxv*100);const r=pct(m.ato,m.po);return `<div class="month-bar-row"><span class="mb-lbl">${MLAB[m.month]}</span><div class="mb-track"><div class="mb-fill" style="width:${w}%"></div></div><span class="mb-val">${rp(m.ato_val)}</span><span class="mb-pct" style="color:${fcl(r)}">${r}%</span></div>`;}).join('');
    const topProds=p.products.slice(0,5);
    const tpRows=topProds.map((x,i)=>{const fr=pct(x.ato,x.po);const cat=categorize(x.name);return `<tr>
      <td style="font-family:var(--mono);font-size:10px;color:#bbb">${i+1}</td><td class="bold">${x.name}</td><td>${badge(cat)}</td>
      <td class="num bold" style="color:var(--or)">${rp(x.ato_val)}</td>
      <td><div class="fb-wrap"><div class="fb"><div class="fb-fill" style="width:${fr}%;background:${fcl(fr)}"></div></div><div class="fb-num" style="color:${fcl(fr)}">${fr}%</div></div></td>
    </tr>`;}).join('');
    // Colour groups mini preview
    const cgPreview = renderColourGroups(p.colours);
    return h+kpis+`<div class="chart-row ${ms.length>3?'r21':'r1'}">
      <div class="cbox"><h3>Tren ATO Value per Bulan</h3>${mbars}</div>
      ${ms.length>3?`<div class="cbox"><h3>Colour Groups (ATO Qty)</h3><div style="padding:4px 0">${cgPreview}</div></div>`:''}
    </div>
    <div class="tbl-wrap"><table class="dt"><caption style="text-align:left;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:rgba(15,31,58,.4);padding:9px 10px;caption-side:top">Top 5 Produk by ATO Value</caption>
    <thead><tr><th>#</th><th>Produk</th><th>Kategori</th><th class="num">ATO Value</th><th>Fulfillment</th></tr></thead><tbody>${tpRows}</tbody></table></div>`;}


  if(sec==='insights'){
    const I=INS;
    // Revenue concentration doughnut
    mkChart('concChart',{type:'doughnut',data:{
      labels:[...I.top10.map(x=>x.n.split(' ')[0]),'Others'],
      datasets:[{data:[...I.top10.map(x=>+(x.v/1e6).toFixed(1)),+((I.total_ato-I.top10.reduce((s,x)=>s+x.v,0))/1e6).toFixed(1)],
        backgroundColor:['#E8611A','#0F1F3A','#378ADD','#1D9E75','#E8A020','#C0392B','#3D5A80','#6A8A3A','#9A3A7A','#3A7A9A','#aaa'],
        borderWidth:0,cutout:'60%'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>` ${ctx.label}: Rp${ctx.parsed}Jt`}}}}});
    // Fulfillment tier doughnut
    mkChart('tierChart',{type:'doughnut',data:{
      labels:['High ≥90%','Mid 70–89%','Low <70%'],
      datasets:[{data:[I.n_high,I.n_mid,I.n_low],backgroundColor:['#1D9E75','#E8A020','#C0392B'],borderWidth:0,cutout:'60%'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed} distributor`}}}}});
    return;
  }
  if(sec==='flow'){
    // Stacked bar chart: ATO (bottom) + unmet gap (top) each month; line: fulfillment %
    const g=t.ori,a=t.ato_val,n=t.net;
    return h+`<div class="funnel">
      <div class="funnel-step"><div class="funnel-lbl">Gross Order Value (ORI PO)</div><div class="funnel-val" style="color:var(--slate)">${rp(g)}</div><div class="funnel-qty">${qf(t.po)} pcs dipesan</div><div class="funnel-pct" style="background:var(--mist);color:var(--slate)">100% baseline</div><div class="funnel-track"><div class="funnel-fill" style="width:100%;background:var(--slate)"></div></div></div>
      <div class="funnel-step"><div class="funnel-lbl">Available To Order (ATO)</div><div class="funnel-val" style="color:var(--or)">${rp(a)}</div><div class="funnel-qty">${qf(t.ato)} pcs terpenuhi</div><div class="funnel-pct" style="background:#FFF0E6;color:var(--or)">${pct(a,g)}% dari gross</div><div class="funnel-track"><div class="funnel-fill" style="width:${pct(a,g)}%;background:var(--or)"></div></div></div>
      <div class="funnel-step"><div class="funnel-lbl">Net Sales (est.)</div><div class="funnel-val" style="color:var(--green)">${rp(n)}</div><div class="funnel-qty">setelah diskon retailer</div><div class="funnel-pct" style="background:#E8F8F2;color:var(--green)">${pct(n,g)}% dari gross</div><div class="funnel-track"><div class="funnel-fill" style="width:${pct(n,g)}%;background:var(--green)"></div></div></div>
    </div>
    <div class="kpi-row" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi"><div class="kpi-lbl">Fulfillment Rate</div><div class="kpi-v" style="color:${fcl(rate)}">${rate}%</div><div class="kpi-sub">${rate>=80?'⬆ Sangat baik':rate>=65?'⚠ Perlu dimonitor':'⬇ Perlu perhatian'}</div></div>
      <div class="kpi"><div class="kpi-lbl">Unmet (Lost)</div><div class="kpi-v rd">${qf(t.po-t.ato)}</div><div class="kpi-sub" style="color:var(--red)">${rp(t.ori-t.ato_val)} potensi hilang</div></div>
      <div class="kpi"><div class="kpi-lbl">Avg Discount</div><div class="kpi-v am">${Math.round((1-n/a)*100)}%</div><div class="kpi-sub">margin retailer est.</div></div>
    </div>
    <div class="chart-row r1"><div class="cbox">
      <h3>Stacked: ATO (fulfilled) + Unmet (gap) · Line: Fulfillment % MoM</h3>
      <div style="height:160px;position:relative"><canvas id="flowChart"></canvas></div>
    </div></div>`;}

  if(sec==='products'){
    const rows=p.products.map((x,i)=>{const fr=pct(x.ato,x.po);const cat=categorize(x.name);
      // Colour column: show grouped colours
      const cgHtml = renderColourGroups(x.colours.map(c=>[c[0],c[1]]));
      return `<tr>
        <td style="font-family:var(--mono);font-size:10px;color:#bbb">${i+1}</td>

        <td class="num">${qf(x.po)}</td>
        <td class="num bold" style="color:var(--or)">${rp(x.ato_val)}</td>

        <td style="min-width:100px"><div class="fb-wrap"><div class="fb"><div class="fb-fill" style="width:${fr}%;background:${fcl(fr)}"></div></div><div class="fb-num" style="color:${fcl(fr)}">${fr}%</div></div></td>
        <td style="max-width:200px">${cgHtml}</td>

    const cats={Babywear:0,Boys:0,Girls:0,Dresses:0,Other:0};
    p.products.forEach(x=>{const c=categorize(x.name);cats[c]=(cats[c]||0)+x.ato_val;});
    const cl=Object.keys(cats).filter(k=>cats[k]>0);
    const hasCatData=cl.length>1;
    const sc=p.sizeclass;const scl=['Baby','Toddler','Kids'].filter(k=>sc[k]&&sc[k].po>0);
    const tc=p.colours.slice(0,7);
    return h+
    (hasCatData?`<div class="chart-row r111" style="margin-bottom:14px">
      <div class="cbox" ><h3>Category Mix (ATO Value)</h3><div style="height:148px;position:relative"><canvas id="catChart"></canvas></div></div>
      <div class="cbox"><h3>Size Class (PO Qty)</h3><div style="height:148px;position:relative"><canvas id="szChart2"></canvas></div></div>
      <div class="cbox"><h3>Colour Groups (ATO Qty)</h3><div style="height:148px;position:relative"><canvas id="colChart"></canvas></div></div>
    </div>`:'')
    +`<div class="tbl-wrap"><table class="dt">
      <caption style="text-align:left;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:rgba(15,31,58,.4);padding:9px 10px;caption-side:top">Semua Produk — Top ${p.products.length} by ATO Value</caption>

  if(sec==='colours'){

  if(sec==='sizeclass'){

    return h+`<div class="chart-row r21">
      <div class="cbox"><h3>Size Class Distribution (PO Qty)</h3>${bars}<div style="margin-top:10px;font-family:var(--mono);font-size:9.5px;color:rgba(15,31,58,.4)">Baby = NB–2Y · Toddler = 1–3Y · Kids = 4–6Y+</div></div>

  if(sec==='timeline'){
    const ms=p.mseries;const rows=ms.map(m=>{const r=pct(m.ato,m.po);return `<tr><td class="bold">${MLAB[m.month]}</td><td class="num">${qf(m.po)}</td><td class="num">${qf(m.ato)}</td><td class="num"><span style="color:${fcl(r)};font-weight:700">${r}%</span></td><td class="num">${rp(m.ori)}</td><td class="num bold" style="color:var(--or)">${rp(m.ato_val)}</td><td class="num" style="color:var(--green)">${rp(m.net)}</td></tr>`;}).join('');
    return h+`<div class="chart-row r1" style="margin-bottom:14px"><div class="cbox"><h3>Stacked: ATO + Unmet per Bulan · Line: Fulfillment % MoM</h3><div style="height:160px;position:relative"><canvas id="tlChart"></canvas></div></div></div>
    <div class="tbl-wrap"><table class="dt"><thead><tr><th>Bulan</th><th class="num">PO</th><th class="num">ATO</th><th class="num">Fulfill</th><th class="num">Gross</th><th class="num">ATO Value</th><th class="num">Net</th></tr></thead><tbody>${rows}</tbody></table></div>`;}

  if(sec==='branches'){
    const rollup=`<div class="br-rollup"><h4>🌐 ${p.parent} — Global (Semua Cabang)</h4>
      <div class="mini-kpis">
        <div class="mk"><div class="v">${qf(t.po)}</div><div class="l">PO Qty</div></div>
        <div class="mk"><div class="v">${qf(t.ato)}</div><div class="l">ATO Qty</div></div>
        <div class="mk"><div class="v or">${rp(t.ato_val)}</div><div class="l">ATO Value</div></div>
        <div class="mk"><div class="v" style="color:#5FD4A8">${rp(t.net)}</div><div class="l">Net Sales</div></div>
        <div class="mk"><div class="v" style="color:${fcl(pct(t.ato,t.po))>=70?'#5FD4A8':'#F5924A'}">${pct(t.ato,t.po)}%</div><div class="l">Fulfillment</div></div>
      </div></div>`;
    const bcards=p.branches.map(b=>{const bt=b.totals;const br2=pct(bt.ato,bt.po);const ms2=b.mseries||[];
      const mxv=Math.max(...ms2.map(m=>m.ato_val),1);
      const mbars=ms2.map(m=>{const w=Math.round(m.ato_val/mxv*100);const r2=pct(m.ato,m.po);return `<div class="month-bar-row"><span class="mb-lbl">${MLAB[m.month]}</span><div class="mb-track"><div class="mb-fill" style="width:${w}%"></div></div><span class="mb-val">${rp(m.ato_val)}</span><span class="mb-pct" style="color:${fcl(r2)}">${r2}%</span></div>`;}).join('');
      return `<div class="br-card"><div class="br-name">🏪 ${b.branch} <span class="badge bn" style="font-size:9px">${b.n_orders} order · ${br2}% ATO</span></div>
        <div class="br-mini"><div class="br-stat"><div class="bsl">PO Qty</div><div class="bsv">${qf(bt.po)}</div></div><div class="br-stat"><div class="bsl">ATO Qty</div><div class="bsv">${qf(bt.ato)}</div></div><div class="br-stat"><div class="bsl">ATO Value</div><div class="bsv or">${rp(bt.ato_val)}</div></div><div class="br-stat"><div class="bsl">Net Sales</div><div class="bsv gr">${rp(bt.net)}</div></div></div>
        ${ms2.length>0?`<div style="margin-top:12px">${mbars}</div>`:''}
      </div>`;}).join('');
    return h+rollup+bcards;}
  return h;}

/* ═════ CHARTS ═════ */
function stackedAtoChart(id, ms, height){
  // ms = array of {month, po, ato, ori, ato_val, net}
  // Stacked: bottom = ATO value (orange), top = unmet (grey)
  // Line overlay = fulfillment % (right axis)
  const labels = ms.map(m=>MLAB[m.month]);
  const atoVals = ms.map(m=>+(m.ato_val/1e6).toFixed(1));
  const unmetVals = ms.map(m=>+((m.ori-m.ato_val)/1e6).toFixed(1));
  const frates = ms.map(m=>pct(m.ato,m.po));
  mkChart(id,{
    data:{labels,datasets:[
      {type:'bar',label:'ATO (Fulfilled)',data:atoVals,backgroundColor:C.or+'CC',borderRadius:{topLeft:0,topRight:0,bottomLeft:3,bottomRight:3},stack:'v',yAxisID:'y'},
      {type:'bar',label:'Unmet (Gap)',data:unmetVals,backgroundColor:'rgba(15,31,58,.10)',borderRadius:{topLeft:3,topRight:3,bottomLeft:0,bottomRight:0},stack:'v',yAxisID:'y'},
      {type:'line',label:'Fulfillment %',data:frates,borderColor:C.green,backgroundColor:'transparent',borderWidth:2,pointRadius:3,pointBackgroundColor:C.green,tension:.3,yAxisID:'y1'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{family:'DM Mono',size:9},boxWidth:9,padding:8}},
        tooltip:{callbacks:{label:ctx=>{if(ctx.datasetIndex===2)return` ${ctx.parsed.y}%`;return` Rp${ctx.parsed.y}Jt`;}}}},
      scales:{x:{grid:{display:false},ticks:{font:{family:'DM Mono',size:9}},stacked:true},
              y:{stacked:true,ticks:{callback:v=>`Rp${v}Jt`,font:{family:'DM Mono',size:9}},grid:{color:'rgba(0,0,0,.04)'}},
              y1:{position:'right',ticks:{callback:v=>v+'%',font:{family:'DM Mono',size:9}},grid:{display:false},min:0,max:100}}},
  });}

function donutCfg(labels, data, colors){
  return {type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,cutout:'62%'}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:4,bottom:0}},
      plugins:{legend:{position:'bottom',align:'start',labels:{font:{family:'DM Mono',size:8.5},boxWidth:8,padding:6}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed}${typeof data[0]==='string'?'':''}` }}}}};}

function drawCharts(){
  const sec=CURSEC;
  if(CUR===-1){
    if(sec==='trend'){
      const mm=DATA.market_month;const mlist=MONTHS.filter(m=>mm[m]);
      stackedAtoChart('trendChart', mlist.map(m=>({month:m,po:mm[m].po,ato:mm[m].ato,ori:mm[m].ori,ato_val:mm[m].ato_val,net:mm[m].net})));
    }
    return;}
  const p=DATA.parents[CUR];
  if(sec==='summary' && p.mseries.length>3){
    // Colour groups donut for summary page right panel
    const cgAgg={};p.colours.forEach(c=>{const g=COLOUR_GROUPS[colourGroup(c[0])];const k=colourGroup(c[0]);(cgAgg[k]=cgAgg[k]||{hex:g.hex,v:0}).v+=c[2];});
    const cgl=Object.entries(cgAgg).sort((a,b)=>b[1].v-a[1].v);
    // No chart needed — already showing as badges; skip
  }

  if(sec==='insights'){
    const I=INS;
    // Revenue concentration doughnut
    mkChart('concChart',{type:'doughnut',data:{
      labels:[...I.top10.map(x=>x.n.split(' ')[0]),'Others'],
      datasets:[{data:[...I.top10.map(x=>+(x.v/1e6).toFixed(1)),+((I.total_ato-I.top10.reduce((s,x)=>s+x.v,0))/1e6).toFixed(1)],
        backgroundColor:['#E8611A','#0F1F3A','#378ADD','#1D9E75','#E8A020','#C0392B','#3D5A80','#6A8A3A','#9A3A7A','#3A7A9A','#aaa'],
        borderWidth:0,cutout:'60%'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>` ${ctx.label}: Rp${ctx.parsed}Jt`}}}}});
    // Fulfillment tier doughnut
    mkChart('tierChart',{type:'doughnut',data:{
      labels:['High ≥90%','Mid 70–89%','Low <70%'],
      datasets:[{data:[I.n_high,I.n_mid,I.n_low],backgroundColor:['#1D9E75','#E8A020','#C0392B'],borderWidth:0,cutout:'60%'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed} distributor`}}}}});
    return;
  }
  if(sec==='flow'){
    stackedAtoChart('flowChart', p.mseries);}
  if(sec==='products'){
    const cats={Babywear:0,Boys:0,Girls:0,Dresses:0,Other:0};
    p.products.forEach(x=>{const c=categorize(x.name);cats[c]=(cats[c]||0)+x.ato_val;});
    const cl=Object.keys(cats).filter(k=>cats[k]>0);const cv=cl.map(k=>+(cats[k]/1e6).toFixed(1));
    if(cl.length>1){
      mkChart('catChart',donutCfg(cl,cv,[C.or,C.blue,C.navy,C.green,C.slate].slice(0,cl.length)));
      const sc=p.sizeclass;const scl=['Baby','Toddler','Kids'].filter(k=>sc[k]&&sc[k].po>0);const scv=scl.map(k=>Math.round(sc[k].po));
      mkChart('szChart2',donutCfg(scl,scv,[C.or,C.blue,C.navy]));
      // Colour GROUP donut
      const cgAgg={};p.colours.forEach(c=>{const k=colourGroup(c[0]);const g=COLOUR_GROUPS[k]||{hex:'#999'};(cgAgg[k]=cgAgg[k]||{hex:g.hex,v:0}).v+=c[2];});
      const cgl=Object.entries(cgAgg).sort((a,b)=>b[1].v-a[1].v).slice(0,7);
      mkChart('colChart',donutCfg(cgl.map(x=>x[0]),cgl.map(x=>Math.round(x[1].v)),cgl.map(x=>x[1].hex)));
    }}
  if(sec==='sizeclass'){
    const sc=p.sizeclass;const skl=['Baby','Toddler','Kids'].filter(k=>sc[k]&&sc[k].po>0);const skv=skl.map(k=>Math.round(sc[k].po));
    mkChart('szChart',donutCfg(skl,skv,[C.or,C.blue,C.navy]));}
  if(sec==='timeline'){stackedAtoChart('tlChart',p.mseries);}
}

buildTabs();buildSidebar();render();updatePickerLabel();

// ── Iframe embed: hide topbar & tighten padding when loaded inside parent ──
if (window.self !== window.top) {
  const topbar = document.querySelector('.topbar');
  const shell  = document.querySelector('.shell');
  const content = document.querySelector('.content');
  if (topbar)  topbar.style.display = 'none';
  if (shell)   shell.style.paddingTop = '0';
  if (content) content.style.padding = '16px 24px 40px';
}
</script>
