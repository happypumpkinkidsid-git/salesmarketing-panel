# Netlify config — monorepo for Happy Pumpkin web dashboards
# Primary deploy: KOL Command Center (Hasna-facing).
# Other dashboards migrate in later as additional Netlify sites (own base dir)
# or via root landing + redirects.

[build]
  # Primary site = HP Sales Network admin (hpsalesadmin.netlify.app).
  # The KOL Command Center is served within it at /kol and embedded as the
  # "KOL Command Center" tab. Functions are shared from netlify/functions.
  publish = "apps/hp-sales-dashboard"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA-style fallback not needed (multi-file static). Cache headers for assets:
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker + manifest must always revalidate so PWA updates roll out.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"
